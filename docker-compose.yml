services:
  db:
    image: postgres:16-alpine
    container_name: chatgpt2api-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatgpt2api
      POSTGRES_USER: chatgpt2api
      POSTGRES_PASSWORD: chatgpt2api
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatgpt2api -d chatgpt2api"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:80"
    volumes:
      - ./data:/app/data
      - ./case-data:/app/case-data
    environment:
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql://chatgpt2api:chatgpt2api@db:5432/chatgpt2api
      CONTENT_DATABASE_URL: postgresql://chatgpt2api:chatgpt2api@db:5432/chatgpt2api
      CONTENT_LIBRARY_SOURCE_DIR: /app/case-data
      CONTENT_LIBRARY_SEED: auto
      CHATGPT2API_AUTH_KEY: abcd.1234

volumes:
  db-data:
